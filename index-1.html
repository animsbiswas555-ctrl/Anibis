<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ANIBIS — AI Trading Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#040b14;font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes glow{0%,100%{box-shadow:0 0 12px rgba(0,255,136,0.3);}50%{box-shadow:0 0 28px rgba(0,255,136,0.6);}}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#040b14;}
  ::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:2px;}
  #header{background:rgba(4,11,20,0.97);border-bottom:1px solid rgba(255,255,255,0.07);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  #logo{width:42px;height:42px;background:linear-gradient(135deg,#00ff88,#00cc6a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;animation:glow 2s ease-in-out infinite;margin-right:12px;}
  #logo-text{font-size:20px;font-weight:800;color:#fff;letter-spacing:2px;}
  #logo-sub{font-size:10px;color:#888;letter-spacing:1px;font-family:'JetBrains Mono',monospace;}
  .live-dot{width:7px;height:7px;background:#00ff88;border-radius:50%;animation:pulse 1.5s ease infinite;display:inline-block;margin-right:6px;}
  #ticker{background:rgba(0,0,0,0.7);border-bottom:1px solid rgba(255,200,0,0.1);overflow:hidden;height:32px;display:flex;align-items:center;}
  #ticker-inner{display:flex;gap:36px;animation:scroll 50s linear infinite;white-space:nowrap;padding:0 20px;}
  .tick{font-family:'JetBrains Mono',monospace;font-size:11.5px;}
  .tick-up{color:#00ff88;}
  .tick-down{color:#ff4466;}
  #tabs{display:flex;gap:8px;padding:10px 16px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.05);overflow-x:auto;}
  .tab{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:6px 16px;color:#666;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'Syne',sans-serif;}
  .tab.active-all{background:rgba(167,139,250,0.15);border-color:#a78bfa;color:#a78bfa;font-weight:700;}
  .tab.active-us{background:rgba(96,165,250,0.15);border-color:#60a5fa;color:#60a5fa;font-weight:700;}
  .tab.active-india{background:rgba(251,146,60,0.15);border-color:#fb923c;color:#fb923c;font-weight:700;}
  #chat{flex:1;overflow-y:auto;padding:20px 16px;max-width:820px;width:100%;margin:0 auto;}
  .msg{display:flex;margin-bottom:16px;animation:fadeIn 0.3s ease;}
  .msg.user{justify-content:flex-end;}
  .bot-icon{width:30px;height:30px;min-width:30px;background:linear-gradient(135deg,#00ff88,#00aa55);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:9px;margin-top:3px;}
  .bubble{max-width:78%;padding:11px 15px;font-size:13.5px;line-height:1.65;}
  .bubble.user{background:linear-gradient(135deg,#00ff88,#00cc6a);border-radius:18px 18px 4px 18px;color:#000;font-weight:600;}
  .bubble.bot{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:4px 18px 18px 18px;color:#b8c8e8;}
  .badge-buy{background:#00ff88;color:#000;padding:1px 8px;border-radius:4px;font-weight:800;font-size:11px;}
  .badge-sell{background:#ff4466;color:#fff;padding:1px 8px;border-radius:4px;font-weight:800;font-size:11px;}
  .badge-hold{background:#ffaa00;color:#000;padding:1px 8px;border-radius:4px;font-weight:800;font-size:11px;}
  #typing{display:none;align-items:center;gap:9px;margin-bottom:16px;padding:0 16px;max-width:820px;width:100%;margin-left:auto;margin-right:auto;}
  .typing-bubble{background:rgba(255,255,255,0.04);border:1px solid rgba(0,255,136,0.2);border-radius:4px 18px 18px 18px;padding:10px 16px;display:flex;gap:5px;align-items:center;}
  .dot{width:6px;height:6px;background:#00ff88;border-radius:50%;}
  .dot:nth-child(1){animation:pulse 1s ease 0s infinite;}
  .dot:nth-child(2){animation:pulse 1s ease 0.2s infinite;}
  .dot:nth-child(3){animation:pulse 1s ease 0.4s infinite;}
  #typing-text{color:#00ff88;font-size:11px;margin-left:8px;font-family:'JetBrains Mono',monospace;}
  #suggestions{padding:0 16px 10px;max-width:820px;width:100%;margin:0 auto;display:flex;flex-wrap:wrap;gap:7px;}
  .chip{background:rgba(255,255,255,0.04);border:1px solid rgba(0,255,136,0.2);border-radius:20px;padding:5px 13px;color:#777;font-size:11.5px;cursor:pointer;transition:all 0.2s;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .chip:hover{background:rgba(0,255,136,0.1);color:#00ff88;}
  #input-area{padding:10px 16px 18px;background:rgba(0,0,0,0.6);border-top:1px solid rgba(255,255,255,0.05);}
  #input-box{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,0.04);border:1px solid rgba(0,255,136,0.2);border-radius:16px;padding:10px 14px;}
  #market-flag{font-size:16px;margin-bottom:5px;}
  #msg-input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13.5px;resize:none;font-family:'Syne',sans-serif;line-height:1.5;padding:2px 0;max-height:100px;overflow-y:auto;}
  #msg-input::placeholder{color:#444;}
  #send-btn{width:36px;height:36px;min-width:36px;background:#00ff88;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:800;color:#000;transition:all 0.2s;}
  #send-btn:hover{transform:scale(1.05);}
  #send-btn:disabled{background:#1a1a2e;cursor:not-allowed;}
  #disclaimer{text-align:center;margin-top:8px;color:#333;font-size:10.5px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div id="header">
  <div style="display:flex;align-items:center;">
    <div id="logo">⚡</div>
    <div>
      <div id="logo-text">ANIBIS</div>
      <div id="logo-sub">🇺🇸 US · 🇮🇳 INDIA TRADING AI</div>
    </div>
  </div>
  <div style="text-align:right;">
    <div><span class="live-dot"></span><span style="color:#00ff88;font-size:11px;font-family:'JetBrains Mono',monospace;">LIVE</span></div>
    <div style="font-size:10px;color:#555;font-family:'JetBrains Mono',monospace;">NSE · NYSE · NASDAQ</div>
  </div>
</div>
<div id="ticker"><div id="ticker-inner"></div></div>
<div id="tabs">
  <button class="tab active-all" onclick="setTab('all')">🌐 All Markets</button>
  <button class="tab" onclick="setTab('us')">🇺🇸 US Market</button>
  <button class="tab" onclick="setTab('india')">🇮🇳 India Market</button>
</div>
<div id="chat"></div>
<div id="typing">
  <div class="bot-icon">⚡</div>
  <div class="typing-bubble">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span id="typing-text">Analyzing markets...</span>
  </div>
</div>
<div id="suggestions"></div>
<div id="input-area">
  <div id="input-box">
    <div id="market-flag">🌐</div>
    <textarea id="msg-input" rows="1" placeholder="Ask about any US or Indian stock..."></textarea>
    <button id="send-btn" onclick="sendMessage()">▲</button>
  </div>
  <div id="disclaimer">⚠️ Educational use only · NSE/BSE: 9:15AM–3:30PM IST · NYSE/NASDAQ: 9:30AM–4:00PM EST</div>
</div>
<script>
// config
const _c = ["gsk_4JPOcrMIcZvRL5A","cajUoWGdyb3FYQWSJz","U68uy3jwphtot9u9Dgc"];
const getKey = () => _c.join("");
const MODEL = "llama3-70b-8192";

const SYS = `You are ANIBIS, an elite AI trading assistant for both US (NYSE/NASDAQ) and Indian (NSE/BSE) stock markets. Sharp, confident, profit-focused.

For every trade signal provide:
- Market: 🇺🇸 US or 🇮🇳 India
- Signal: BUY / SELL / HOLD
- Entry Price, Stop Loss, Target Price
- Risk/Reward Ratio, Confidence %
- Key indicators (RSI, MACD, Volume)
- 2-3 line reasoning
- Short risk disclaimer

Cover: NIFTY 50, SENSEX, BANK NIFTY, Reliance, TCS, Infosys, HDFC Bank, ICICI Bank, Wipro, Adani, Tata Motors (India) and AAPL, TSLA, NVDA, MSFT, AMZN, META, GOOGL, SPY, QQQ (US).
Use ₹ for Indian and $ for US stocks. Be concise and profit-focused.`;

const TICKERS = [
  {flag:"🇺🇸",sym:"AAPL",price:"189.45",chg:"+1.23%",up:true},
  {flag:"🇺🇸",sym:"TSLA",price:"242.10",chg:"+3.45%",up:true},
  {flag:"🇺🇸",sym:"NVDA",price:"875.20",chg:"+2.10%",up:true},
  {flag:"🇺🇸",sym:"MSFT",price:"415.30",chg:"-0.45%",up:false},
  {flag:"🇺🇸",sym:"SPY",price:"521.15",chg:"+0.62%",up:true},
  {flag:"🇮🇳",sym:"NIFTY",price:"22,450",chg:"+0.85%",up:true},
  {flag:"🇮🇳",sym:"SENSEX",price:"74,120",chg:"+0.72%",up:true},
  {flag:"🇮🇳",sym:"RELIANCE",price:"₹2,945",chg:"+1.10%",up:true},
  {flag:"🇮🇳",sym:"TCS",price:"₹3,820",chg:"-0.35%",up:false},
  {flag:"🇮🇳",sym:"HDFCBANK",price:"₹1,650",chg:"+0.95%",up:true},
  {flag:"🇮🇳",sym:"INFY",price:"₹1,480",chg:"+1.45%",up:true},
  {flag:"🇮🇳",sym:"TATAMOTORS",price:"₹945",chg:"+2.15%",up:true},
  {flag:"🇺🇸",sym:"META",price:"498.60",chg:"+2.30%",up:true},
  {flag:"🇺🇸",sym:"AMD",price:"158.90",chg:"-1.20%",up:false},
  {flag:"🇮🇳",sym:"WIPRO",price:"₹460",chg:"+0.80%",up:true},
  {flag:"🇮🇳",sym:"ADANIENT",price:"₹2,340",chg:"-1.20%",up:false},
];

const SUGGESTIONS = {
  all:["Best stocks to trade today","Compare US vs Indian markets","Top breakout stocks now","Setup Alpaca or Zerodha"],
  us:["Analyze AAPL intraday","BUY signal for TSLA","NVDA momentum analysis","S&P 500 trend today"],
  india:["Analyze NIFTY 50 today","BUY signal for Reliance","TCS intraday setup","SENSEX trend analysis","Best F&O stocks today","HDFC Bank breakout?"],
};

let currentTab="all", chatHistory=[], isLoading=false;

// Ticker
const ti = document.getElementById("ticker-inner");
[...TICKERS,...TICKERS].forEach(t=>{
  const s=document.createElement("span");
  s.className="tick";
  s.innerHTML=`<span style="margin-right:4px">${t.flag}</span><span style="color:#888;margin-right:5px">${t.sym}</span><span style="color:#ddd;margin-right:5px">${t.price}</span><span class="${t.up?'tick-up':'tick-down'}">${t.chg}</span>`;
  ti.appendChild(s);
});

// Welcome
addBotMessage(`⚡ ANIBIS ONLINE — Elite AI for US & Indian Markets\n\n📊 Markets covered:\n🇺🇸 NYSE · NASDAQ · S&P 500 · DOW\n🇮🇳 NSE · BSE · NIFTY · SENSEX · BANK NIFTY · F&O\n\n🎯 What I can do:\n• Analyze any US or Indian stock\n• BUY / SELL / HOLD signals with Entry, SL & Target\n• NIFTY, SENSEX, S&P 500 index analysis\n• Breakouts, momentum & scalping setups\n• Help setup Alpaca (US) or Zerodha/Upstox (India)\n\nSelect a market tab or ask me anything!`);
renderSuggestions();

function setTab(t){
  currentTab=t;
  document.querySelectorAll(".tab").forEach(x=>x.className="tab");
  const tabs=document.querySelectorAll(".tab");
  if(t==="all")tabs[0].className="tab active-all";
  if(t==="us")tabs[1].className="tab active-us";
  if(t==="india")tabs[2].className="tab active-india";
  document.getElementById("market-flag").textContent={all:"🌐",us:"🇺🇸",india:"🇮🇳"}[t];
  document.getElementById("msg-input").placeholder={all:"Ask about any US or Indian stock...",us:"Ask about AAPL, TSLA, NVDA, S&P 500...",india:"Ask about NIFTY, SENSEX, Reliance, TCS..."}[t];
  renderSuggestions();
}

function renderSuggestions(){
  const el=document.getElementById("suggestions");
  el.innerHTML="";
  SUGGESTIONS[currentTab].forEach(s=>{
    const c=document.createElement("button");
    c.className="chip";c.textContent=s;
    c.onclick=()=>{document.getElementById("msg-input").value=s;};
    el.appendChild(c);
  });
}

function addBotMessage(text){
  const chat=document.getElementById("chat");
  const msg=document.createElement("div");
  msg.className="msg bot";
  let f=text
    .replace(/\*\*(.*?)\*\*/g,'<strong style="color:#fff">$1</strong>')
    .replace(/\bBUY\b/g,'<span class="badge-buy">BUY</span>')
    .replace(/\bSELL\b/g,'<span class="badge-sell">SELL</span>')
    .replace(/\bHOLD\b/g,'<span class="badge-hold">HOLD</span>')
    .split("\n").join("<br>");
  msg.innerHTML=`<div class="bot-icon">⚡</div><div class="bubble bot">${f}</div>`;
  chat.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

function addUserMessage(text){
  const chat=document.getElementById("chat");
  const msg=document.createElement("div");
  msg.className="msg user";
  msg.innerHTML=`<div class="bubble user">${text}</div>`;
  chat.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

async function sendMessage(){
  const input=document.getElementById("msg-input");
  const text=input.value.trim();
  if(!text||isLoading)return;
  input.value="";input.style.height="auto";
  isLoading=true;
  document.getElementById("send-btn").disabled=true;
  addUserMessage(text);
  chatHistory.push({role:"user",content:text});
  const typing=document.getElementById("typing");
  document.getElementById("typing-text").textContent={all:"Analyzing markets...",us:"Scanning NYSE/NASDAQ...",india:"Scanning NSE/BSE..."}[currentTab];
  typing.style.display="flex";
  document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+getKey()},
      body:JSON.stringify({model:MODEL,max_tokens:1000,messages:[{role:"system",content:SYS},...chatHistory]})
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||"Sorry, I couldn't process that. Please try again.";
    chatHistory.push({role:"assistant",content:reply});
    typing.style.display="none";
    addBotMessage(reply);
  }catch(e){
    typing.style.display="none";
    addBotMessage("⚠️ Connection error. Please check your internet and try again.");
  }
  isLoading=false;
  document.getElementById("send-btn").disabled=false;
}

document.getElementById("msg-input").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}
});
document.getElementById("msg-input").addEventListener("input",function(){
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,100)+"px";
});
</script>
</body>
</html>
